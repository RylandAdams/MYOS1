# Deploy to Firebase Hosting on merge to main
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Verify hosting bundle
        run: |
          test -f build/index.html
          test -f build/manifest.json
          test -f build/sw.js
          js_count=$(find build/static/js -name '*.js' ! -name '*.map' | wc -l | tr -d ' ')
          test "$js_count" -gt 5
          echo "JS bundles: $js_count"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYOS1_8E625 }}'
          channelId: live
          projectId: myos1-8e625
